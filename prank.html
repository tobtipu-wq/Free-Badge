<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Business</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:url("https://img.freepik.com/free-vector/gradient-instagram-social-media-background_23-2150983087.jpg") no-repeat center/cover;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* overlay */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
opacity:0.85;
z-index:0;
}

/* header */

header{
text-align:center;
color:white;
padding:40px;
position:relative;
z-index:1;
}

header h1{
font-size:42px;
letter-spacing:2px;
display:inline-block;
animation:beat 1.2s infinite, glow 2s infinite;
}

/* beating */

@keyframes beat{
0%{transform:scale(1);}
30%{transform:scale(1.1);}
60%{transform:scale(1);}
100%{transform:scale(1);}
}

/* glowing */

@keyframes glow{
0%{text-shadow:0 0 5px #fff;}
50%{text-shadow:0 0 25px #ffb347,0 0 40px #ff7a18;}
100%{text-shadow:0 0 5px #fff;}
}

header p{
margin-top:10px;
font-size:18px;
}

/* container */

.container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
position:relative;
z-index:1;
}

/* advice card */

.card{

background-image:url("https://png.pngtree.com/thumb_back/fh260/background/20200412/pngtree-a-set-of-emoji-and-facebook-and-instagram-icons-background-image_333769.jpg");
background-size:cover;
background-position:center;

padding:70px;
width:520px;
border-radius:15px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,0.4);

color:white;
position:relative;
overflow:hidden;

}

/* dark overlay inside card */

.card::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);  /* darker overlay */
z-index:0;
}

/* text above overlay */

.card *{
position:relative;
z-index:1;
}

.card h2{
margin-bottom:15px;
color:white;
text-shadow:0 3px 10px rgba(0,0,0,0.9);
}


.card p{
margin-bottom:30px;
color:#f1f1f1;
text-shadow:0 2px 8px rgba(0,0,0,0.9);
}

/* button */

.btn{
background:linear-gradient(45deg,#ff7a18,#ffb347);
color:white;
padding:14px 35px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

a{
text-decoration:none;
}

footer{
text-align:center;
color:white;
padding:15px;
position:relative;
z-index:1;
}

</style>
</head>

<body>

<div class="overlay"></div>

<header>
<h1>Get Meta Verification Free</h1>
<p>Limited Time Offer</p>
</header>

<div class="container">

<div class="card">

<h2>Claim Your Free Meta Vericication Badge</h2>

<p>
This is a limited time offer to claim meta badge free.
This Offer ends soon....!
</p>

<a href="https://own-social.github.io/app/">
<button class="btn">Claim Now</button>
</a>

</div>

</div>

<footer>
© 2026 Business Advice Hub
</footer>

</body>
</html>
